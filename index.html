<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0E1612">
<title>Wayfinder</title>
<style>
  :root {
    --bg: #0E1612;
    --surface: #1C2A22;
    --surface-2: #243528;
    --amber: #F2A33C;
    --bone: #EDE7DA;
    --sage: #8FA396;
    --line: rgba(143,163,150,0.25);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: var(--bg);
    color: var(--bone);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
    display: flex;
    flex-direction: column;
    height: 100dvh;
    padding-top: env(safe-area-inset-top);
  }

  /* ---------- Start screen ---------- */
  #startScreen {
    position: fixed; inset: 0; z-index: 50;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 18px; text-align: center; padding: 32px;
  }
  #startScreen h1 {
    font-family: Georgia, "Times New Roman", serif;
    font-weight: 600; font-size: 42px; letter-spacing: 0.5px;
  }
  #startScreen p { color: var(--sage); font-size: 15px; line-height: 1.5; max-width: 280px; }
  .blaze {
    width: 44px; height: 56px;
    background: var(--amber);
    clip-path: polygon(50% 0%, 100% 38%, 78% 38%, 78% 100%, 22% 100%, 22% 38%, 0% 38%);
    margin-bottom: 6px;
  }
  #startBtn {
    margin-top: 14px;
    background: var(--amber); color: #1a1208;
    border: none; border-radius: 999px;
    font-size: 17px; font-weight: 600;
    padding: 14px 38px; cursor: pointer;
  }
  #startBtn:active { transform: scale(0.97); }
  #startNote { font-size: 12px; color: var(--sage); opacity: 0.8; }

  /* ---------- Header ---------- */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px 6px;
  }
  header .title {
    font-family: Georgia, serif; font-size: 20px; letter-spacing: 0.4px;
  }
  #rescanBtn {
    background: var(--surface); color: var(--bone);
    border: 1px solid var(--line); border-radius: 999px;
    font-size: 13px; padding: 7px 14px; cursor: pointer;
  }
  #rescanBtn:active { background: var(--surface-2); }

  /* ---------- Compass ---------- */
  #compassWrap {
    flex: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 0;
  }
  #bezel {
    position: relative;
    width: min(62vw, 280px);
    aspect-ratio: 1;
    border-radius: 50%;
    border: 1px solid var(--line);
    display: flex; align-items: center; justify-content: center;
  }
  /* tick marks */
  #bezel .tick {
    position: absolute; left: 50%; top: 0;
    width: 2px; height: 10px;
    background: var(--line);
    transform-origin: 50% calc(min(62vw,280px) / 2);
  }
  #arrow {
    width: 34%; height: 44%;
    background: var(--amber);
    clip-path: polygon(50% 0%, 100% 38%, 72% 38%, 72% 100%, 28% 100%, 28% 38%, 0% 38%);
    transition: transform 0.15s linear;
    filter: drop-shadow(0 0 18px rgba(242,163,60,0.35));
  }
  #distance {
    margin-top: 22px;
    font-size: 34px; font-weight: 300; letter-spacing: 0.5px;
    font-variant-numeric: tabular-nums;
  }
  #targetName {
    margin-top: 4px; font-size: 14px; color: var(--sage);
    max-width: 80vw; text-align: center;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  #status {
    margin-top: 10px; font-size: 12px; color: var(--sage); opacity: 0.7;
    text-align: center; padding: 0 24px;
  }

  /* ---------- Card deck ---------- */
  #deck {
    display: flex; gap: 12px;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    padding: 8px 24px calc(22px + env(safe-area-inset-bottom));
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  #deck::-webkit-scrollbar { display: none; }
  .card {
    flex: 0 0 78%;
    max-width: 320px;
    scroll-snap-align: center;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 16px 18px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }
  .card.selected {
    border-color: var(--amber);
    background: var(--surface-2);
  }
  .card h3 {
    font-family: Georgia, serif;
    font-size: 17px; font-weight: 600; margin-bottom: 4px;
  }
  .card .meta {
    font-size: 12px; color: var(--amber); margin-bottom: 6px;
    font-variant-numeric: tabular-nums;
  }
  .card p {
    font-size: 13px; line-height: 1.45; color: var(--sage);
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card .hint { margin-top: 8px; font-size: 11px; color: var(--sage); opacity: 0.6; }
  .card.selected .hint { color: var(--amber); opacity: 0.9; }

  .empty {
    color: var(--sage); font-size: 14px; padding: 20px 24px; text-align: center; width: 100%;
  }
  @media (prefers-reduced-motion: reduce) {
    #arrow { transition: none; }
  }
</style>
</head>
<body>

<div id="startScreen">
  <div class="blaze"></div>
  <h1>Wayfinder</h1>
  <p>Finds interesting places within walking distance and points the way.</p>
  <button id="startBtn">Start exploring</button>
  <span id="startNote">You'll be asked to allow Location and Motion access.</span>
</div>

<header>
  <span class="title">Wayfinder</span>
  <button id="rescanBtn">Rescan</button>
</header>

<div id="compassWrap">
  <div id="bezel"><div id="arrow"></div></div>
  <div id="distance">—</div>
  <div id="targetName">Pick a destination below</div>
  <div id="status"></div>
</div>

<div id="deck"><div class="empty">Scanning…</div></div>

<script>
(function () {
  const state = {
    lat: null, lon: null,
    heading: null,          // compass heading, deg clockwise from true north
    places: [],
    target: null,
    arrowAngle: 0,          // accumulated for smooth wrap-around rotation
  };

  const $ = id => document.getElementById(id);
  const arrow = $("arrow"), distanceEl = $("distance"),
        targetNameEl = $("targetName"), statusEl = $("status"),
        deck = $("deck"), bezel = $("bezel");

  // bezel tick marks every 30°
  for (let i = 0; i < 12; i++) {
    const t = document.createElement("div");
    t.className = "tick";
    t.style.transform = `translateX(-50%) rotate(${i * 30}deg)`;
    bezel.appendChild(t);
  }

  // ---------- math ----------
  const toRad = d => d * Math.PI / 180;
  const toDeg = r => r * 180 / Math.PI;

  function haversineMeters(lat1, lon1, lat2, lon2) {
    const R = 6371000;
    const dLat = toRad(lat2 - lat1), dLon = toRad(lon2 - lon1);
    const a = Math.sin(dLat/2)**2 +
              Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  function bearingDeg(lat1, lon1, lat2, lon2) {
    const y = Math.sin(toRad(lon2-lon1)) * Math.cos(toRad(lat2));
    const x = Math.cos(toRad(lat1)) * Math.sin(toRad(lat2)) -
              Math.sin(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.cos(toRad(lon2-lon1));
    return (toDeg(Math.atan2(y, x)) + 360) % 360;
  }

  function fmtDistance(m) {
    const ft = m * 3.28084;
    if (ft < 1000) return Math.round(ft / 10) * 10 + " ft";
    return (m / 1609.34).toFixed(1) + " mi";
  }

  // ---------- rendering ----------
  function updateCompass() {
    if (!state.target || state.lat == null) return;
    const d = haversineMeters(state.lat, state.lon, state.target.lat, state.target.lon);
    distanceEl.textContent = fmtDistance(d);
    targetNameEl.textContent = state.target.title;

    if (state.heading == null) {
      statusEl.textContent = "Compass unavailable — arrow shows direction relative to north.";
      rotateArrow(bearingDeg(state.lat, state.lon, state.target.lat, state.target.lon));
      return;
    }
    statusEl.textContent = "";
    const brg = bearingDeg(state.lat, state.lon, state.target.lat, state.target.lon);
    rotateArrow(brg - state.heading);
  }

  function rotateArrow(targetDeg) {
    // shortest-path rotation so the arrow doesn't spin the long way around
    let delta = ((targetDeg - state.arrowAngle) % 360 + 540) % 360 - 180;
    state.arrowAngle += delta;
    arrow.style.transform = `rotate(${state.arrowAngle}deg)`;
  }

  function renderDeck() {
    deck.innerHTML = "";
    if (!state.places.length) {
      deck.innerHTML = '<div class="empty">Nothing notable found nearby. Try Rescan from a different spot.</div>';
      return;
    }
    state.places.forEach(p => {
      const card = document.createElement("div");
      card.className = "card" + (state.target && state.target.pageid === p.pageid ? " selected" : "");
      card.innerHTML = `
        <h3>${p.title}</h3>
        <div class="meta">${fmtDistance(p.dist)} away</div>
        <p>${p.extract || "No description available."}</p>
        <div class="hint">${state.target && state.target.pageid === p.pageid ? "● Navigating here" : "Tap to navigate"}</div>`;
      card.addEventListener("click", () => {
        state.target = p;
        renderDeck();
        updateCompass();
      });
      deck.appendChild(card);
    });
  }

  // ---------- data ----------
  async function fetchPlaces() {
    deck.innerHTML = '<div class="empty">Scanning…</div>';
    statusEl.textContent = "";
    const url = "https://en.wikipedia.org/w/api.php" +
      "?action=query&format=json&origin=*" +
      "&generator=geosearch" +
      `&ggscoord=${state.lat}|${state.lon}` +
      "&ggsradius=1600&ggslimit=20" +
      "&prop=extracts|coordinates" +
      "&exintro=1&explaintext=1&exsentences=2&exlimit=20";
    try {
      const res = await fetch(url);
      const data = await res.json();
      const pages = data.query ? Object.values(data.query.pages) : [];
      state.places = pages
        .filter(p => p.coordinates && p.coordinates.length)
        .map(p => ({
          pageid: p.pageid,
          title: p.title,
          extract: p.extract,
          lat: p.coordinates[0].lat,
          lon: p.coordinates[0].lon,
        }))
        .map(p => ({ ...p, dist: haversineMeters(state.lat, state.lon, p.lat, p.lon) }))
        .sort((a, b) => a.dist - b.dist);
      if (state.places.length && !state.target) {
        state.target = state.places[0];
      }
      renderDeck();
      updateCompass();
    } catch (e) {
      deck.innerHTML = '<div class="empty">Couldn\'t reach Wikipedia. Check your connection and tap Rescan.</div>';
    }
  }

  // ---------- sensors ----------
  function startLocation() {
    if (!navigator.geolocation) {
      statusEl.textContent = "Location is not supported in this browser.";
      return;
    }
    navigator.geolocation.watchPosition(
      pos => {
        const first = state.lat == null;
        state.lat = pos.coords.latitude;
        state.lon = pos.coords.longitude;
        if (first) fetchPlaces();
        else updateCompass();
      },
      err => {
        statusEl.textContent = "Location denied. Enable it in Settings → Privacy → Location Services → Safari.";
        deck.innerHTML = '<div class="empty">Location access is required to scan for places.</div>';
      },
      { enableHighAccuracy: true, maximumAge: 3000, timeout: 15000 }
    );
  }

  function handleOrientation(e) {
    if (typeof e.webkitCompassHeading === "number" && !isNaN(e.webkitCompassHeading)) {
      state.heading = e.webkitCompassHeading;          // iOS: clockwise from north
    } else if (e.absolute && e.alpha != null) {
      state.heading = (360 - e.alpha) % 360;           // rough fallback
    }
    updateCompass();
  }

  async function startCompass() {
    if (typeof DeviceOrientationEvent !== "undefined" &&
        typeof DeviceOrientationEvent.requestPermission === "function") {
      try {
        const perm = await DeviceOrientationEvent.requestPermission();
        if (perm === "granted") {
          window.addEventListener("deviceorientation", handleOrientation, true);
        } else {
          statusEl.textContent = "Motion access denied — arrow will show direction relative to north.";
        }
      } catch (_) { /* user dismissed */ }
    } else {
      window.addEventListener("deviceorientationabsolute", handleOrientation, true);
      window.addEventListener("deviceorientation", handleOrientation, true);
    }
  }

  // ---------- wire-up ----------
  $("startBtn").addEventListener("click", async () => {
    $("startScreen").style.display = "none";
    await startCompass();   // must be inside the tap gesture for iOS
    startLocation();
  });

  $("rescanBtn").addEventListener("click", () => {
    state.target = null;
    if (state.lat != null) fetchPlaces();
  });
})();
</script>
</body>
</html>
